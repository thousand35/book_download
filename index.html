<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書管理アプリ book_manager ダウンロード</title>
    <style>
        /* テーマカラーを深めのグリーンに設定 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 50px 20px; background-color: #f0f4f1; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #1b5e20; font-size: 26px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        /* ボタンのデザイン：読書の落ち着きを感じるグリーン */
        .btn { display: inline-block; background-color: #2e7d32; color: white; padding: 18px 35px; text-decoration: none; border-radius: 35px; font-weight: bold; font-size: 18px; margin: 20px 0; transition: 0.3s; box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3); }
        .btn:hover { background-color: #1b5e20; transform: translateY(-2px); }
        
        /* ガイド部分：少し明るめのベージュ系で紙の質感をイメージ */
        .guide { text-align: left; background: #fdfbf7; padding: 20px; border-radius: 12px; font-size: 14px; line-height: 1.6; border: 1px solid #e0e4e1; }
        .guide h2 { font-size: 17px; margin-top: 0; color: #2e7d32; display: flex; align-items: center; }
        .step { margin-bottom: 12px; display: block; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .step:last-child { border-bottom: none; }
        .highlight { font-weight: bold; color: #c62828; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📚 book_manager</h1>
        <div class="subtitle">蔵書管理アプリ 公式ダウンロード</div>
        
        <p>最新のアプリ(APK)をダウンロードして、あなたのライブラリをスマートに管理しましょう。</p>

        <a href="https://github.com/thousand35/book_manager_dist/releases/latest/download/app-release.apk" class="btn">最新版をダウンロード</a>

        <div class="guide">
            <h2>⚙️ インストール手順</h2>
            <span class="step">① 「最新版をダウンロード」をタップして保存。</span>
            <span class="step">② スマホの<span class="highlight">「ファイル」</span>アプリから<span class="highlight">「ダウンロード」</span>フォルダを開く。</span>
            <span class="step">③ <span class="highlight">「app-release.apk」</span>をタップ。</span>
            <span class="step">④ 警告が出た場合は「設定」→「この提供元を許可」を有効にしてインストールを続行してください。</span>
        </div>
        <p style="font-size: 11px; color: #999; margin-top: 20px;">※個人開発アプリのため警告が表示されますが、安全性に問題はありません。</p>
    </div>
</body>
</html>
